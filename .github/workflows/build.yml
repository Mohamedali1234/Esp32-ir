name: Build ESP32 IR Remote

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Build firmware
        run: pio run

      - name: Build LittleFS image (web UI)
        run: pio run --target buildfs

      - name: Package binaries
        run: |
          mkdir -p artifacts
          cp .pio/build/esp32dev/firmware.bin      artifacts/esp32_ir_remote_firmware.bin
          cp .pio/build/esp32dev/littlefs.bin      artifacts/esp32_ir_remote_webui.bin
          echo "── Build complete ──"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-IR-Remote-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## ESP32 IR Remote + Dazzler — Build #${{ github.run_number }}

            ### Files
            | File | Flash Address | Description |
            |------|--------------|-------------|
            | `esp32_ir_remote_firmware.bin` | `0x10000` | Main firmware |
            | `esp32_ir_remote_webui.bin` | `0x290000` | Web UI (LittleFS) |

            ### Flash with esptool
            ```bash
            esptool.py --chip esp32 --port COM3 --baud 921600 write_flash 0x10000  esp32_ir_remote_firmware.bin
            esptool.py --chip esp32 --port COM3 --baud 921600 write_flash 0x290000 esp32_ir_remote_webui.bin
            ```
            > Replace `COM3` with your port (`/dev/ttyUSB0` on Linux, `/dev/cu.usbserial-*` on Mac)

            ### First boot
            - WiFi: **IR Remote** / Password: **IRREMOTE123**
            - Open: **http://192.168.4.1**
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

