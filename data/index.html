<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ESP32 IR Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg:      #07090d;
  --surface: #0c1018;
  --card:    #101620;
  --border:  #1a2d45;
  --accent:  #00d4ff;
  --hot:     #ff4400;
  --hot2:    #ffaa00;
  --green:   #00ff88;
  --danger:  #ff3366;
  --text:    #bdd8f0;
  --muted:   #3d5a75;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Share Tech Mono',monospace;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
}

/* ── Header ───────────────────────────────────────── */
header {
  background:linear-gradient(135deg,#0c1018,#08111e);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex; align-items:stretch;
  position:sticky; top:0; z-index:200;
  box-shadow:0 4px 30px rgba(0,212,255,0.06);
  height:56px;
}

.logo {
  display:flex; align-items:center; gap:10px;
  margin-right:24px; flex-shrink:0;
}
.logo-icon {
  width:34px; height:34px;
  background:linear-gradient(135deg,var(--accent),#0070cc);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:17px; box-shadow:0 0 16px rgba(0,212,255,0.4);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100%{box-shadow:0 0 16px rgba(0,212,255,0.4);}
  50%{box-shadow:0 0 28px rgba(0,212,255,0.7);}
}
.logo h1 {
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
  color:var(--accent); letter-spacing:3px;
  text-shadow:0 0 16px rgba(0,212,255,0.5);
}

/* ── Tab Bar ──────────────────────────────────────── */
.tabs {
  display:flex; align-items:stretch; gap:2px; flex:1;
}
.tab {
  display:flex; align-items:center; gap:7px;
  padding:0 18px; cursor:pointer; font-size:11px;
  letter-spacing:2px; color:var(--muted);
  border-bottom:2px solid transparent;
  transition:all .2s; white-space:nowrap;
  background:none; border-top:none; border-left:none; border-right:none;
  font-family:'Share Tech Mono',monospace;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab.dazzler-tab.active { color:var(--hot); border-bottom-color:var(--hot); }
.tab-dot {
  width:6px; height:6px; border-radius:50%;
  background:currentColor; opacity:0.5;
}
.tab.active .tab-dot { opacity:1; animation:blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

.header-right {
  display:flex; align-items:center; gap:10px; margin-left:auto;
  font-size:10px; color:var(--muted);
}
.online-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--green); box-shadow:0 0 7px var(--green);
  animation:blink 2s infinite;
}

/* ── Pages ────────────────────────────────────────── */
.page { display:none; height:calc(100vh - 56px); overflow:hidden; }
.page.active { display:flex; }

/* ══════════════════════════════════════════════════ */
/*  REMOTE PAGE                                       */
/* ══════════════════════════════════════════════════ */
#page-remote { flex-direction:row; }

.sidebar {
  width:260px; flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-head {
  padding:16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.sidebar-title {
  font-family:'Orbitron',sans-serif; font-size:9px;
  letter-spacing:3px; color:var(--accent); text-transform:uppercase;
}
.btn-circle {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#0070cc);
  border:none; color:#000; font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; box-shadow:0 0 10px rgba(0,212,255,0.3);
}
.btn-circle:hover { transform:scale(1.1); box-shadow:0 0 18px rgba(0,212,255,0.6); }

.remote-list { overflow-y:auto; flex:1; padding:10px; display:flex; flex-direction:column; gap:6px; }

.r-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:var(--card);
  border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
}
.r-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--accent); opacity:0; transition:opacity .2s;
}
.r-item:hover,.r-item.active { border-color:var(--accent); background:rgba(0,212,255,0.05); }
.r-item:hover::before,.r-item.active::before { opacity:1; }
.r-icon { font-size:18px; flex-shrink:0; }
.r-info { flex:1; min-width:0; }
.r-name { font-family:'Orbitron',sans-serif; font-size:11px; font-weight:600;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.r-count { font-size:9px; color:var(--muted); margin-top:2px; }
.r-del { background:none; border:none; color:var(--muted); font-size:13px;
          cursor:pointer; padding:3px 5px; border-radius:4px;
          opacity:0; transition:all .2s; }
.r-item:hover .r-del { opacity:1; }
.r-del:hover { color:var(--danger); background:rgba(255,51,102,0.1); }

.remote-main { flex:1; overflow-y:auto; padding:24px; }

.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:14px; text-align:center; color:var(--muted);
}
.empty-icon { font-size:48px; opacity:0.3; }
.empty-state h2 { font-family:'Orbitron',sans-serif; font-size:16px; }
.empty-state p { font-size:12px; max-width:260px; line-height:1.6; }

.remote-view-header {
  display:flex; align-items:center; gap:14px; margin-bottom:24px;
  padding-bottom:18px; border-bottom:1px solid var(--border);
}
.rv-icon {
  width:50px; height:50px; border-radius:14px;
  background:linear-gradient(135deg,var(--accent),#005eaa);
  display:flex; align-items:center; justify-content:center; font-size:24px;
  box-shadow:0 0 20px rgba(0,212,255,0.25); flex-shrink:0;
}
.rv-info h2 { font-family:'Orbitron',sans-serif; font-size:18px; color:var(--accent); }
.rv-info p { font-size:11px; color:var(--muted); margin-top:3px; }
.rv-actions { margin-left:auto; display:flex; gap:8px; }

.section-label {
  font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:3px;
  color:var(--muted); text-transform:uppercase; margin-bottom:12px;
}

.ir-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:24px; }

.ir-btn {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:14px 10px; cursor:pointer; text-align:center;
  position:relative; overflow:hidden; user-select:none;
  transition:all .15s;
}
.ir-btn::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at center,rgba(0,212,255,0.18),transparent 70%);
  opacity:0; transition:opacity .15s;
}
.ir-btn:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,212,255,0.12); }
.ir-btn:active { transform:scale(0.95); }
.ir-btn:active::after { opacity:1; }
.ir-btn.pressed { border-color:var(--accent); background:rgba(0,212,255,0.1); box-shadow:0 0 18px rgba(0,212,255,0.35); }
.ir-btn.pressed::after { opacity:1; }
.ir-btn.pwr { border-color:var(--danger); }
.ir-btn.pwr:hover { box-shadow:0 4px 16px rgba(255,51,102,0.25); }
.ir-btn-icon { font-size:20px; margin-bottom:5px; }
.ir-btn-name { font-family:'Orbitron',sans-serif; font-size:9px; font-weight:600;
                letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ir-btn-proto { font-size:8px; color:var(--muted); margin-top:2px; }
.ir-btn-x {
  position:absolute; top:3px; right:3px; background:none; border:none;
  color:var(--muted); font-size:10px; cursor:pointer; padding:2px 4px;
  border-radius:3px; opacity:0; transition:all .15s;
}
.ir-btn:hover .ir-btn-x { opacity:1; }
.ir-btn-x:hover { color:var(--danger); background:rgba(255,51,102,0.12); }

.no-btns { text-align:center; padding:36px; color:var(--muted); font-size:12px; line-height:1.7; }

/* ══════════════════════════════════════════════════ */
/*  DAZZLER PAGE                                      */
/* ══════════════════════════════════════════════════ */
#page-dazzler {
  flex-direction:column; align-items:center;
  overflow-y:auto; padding:28px 20px; background:var(--bg);
}
#page-dazzler.dazzling { animation:dz-bg 0.09s step-end infinite; }
@keyframes dz-bg { 0%{background:#07090d;} 50%{background:#0f0500;} }

.dz-flash {
  position:fixed; inset:0; pointer-events:none; z-index:9998; display:none;
  background:rgba(255,68,0,0.03);
}
.dazzling .dz-flash { display:block; animation:dz-flicker 0.09s step-end infinite; }
@keyframes dz-flicker{0%{opacity:.4;}50%{opacity:.8;}100%{opacity:.4;}}

.dz-wrap { width:100%; max-width:640px; }

.dz-trigger-zone { position:relative; margin:0 auto 28px; width:240px; height:240px; }
.dz-ring {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:240px; height:240px; border-radius:50%;
  border:2px solid var(--hot); opacity:0; pointer-events:none;
}
.dz-rings-active .dz-ring { animation:ring-out 1s ease-out infinite; }
.dz-rings-active .dz-ring:nth-child(2){animation-delay:.33s;}
.dz-rings-active .dz-ring:nth-child(3){animation-delay:.66s;}
@keyframes ring-out{0%{transform:translate(-50%,-50%) scale(1);opacity:.7;}100%{transform:translate(-50%,-50%) scale(2.3);opacity:0;}}

.dz-btn {
  width:240px; height:240px; border-radius:50%;
  border:3px solid var(--hot);
  background:radial-gradient(circle at 38% 34%,#180700,#07090d);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px;
  position:relative; z-index:2;
  transition:all .15s; user-select:none; -webkit-tap-highlight-color:transparent;
  box-shadow:0 0 40px rgba(255,68,0,0.15), inset 0 0 30px rgba(255,68,0,0.04);
}
.dz-btn:active { transform:scale(0.96); }
.dz-btn.on {
  box-shadow:0 0 80px rgba(255,68,0,0.55),0 0 160px rgba(255,68,0,0.18),inset 0 0 50px rgba(255,68,0,0.12);
  animation:dz-pulse .15s ease-in-out infinite alternate;
}
@keyframes dz-pulse{
  from{box-shadow:0 0 60px rgba(255,68,0,.5),0 0 110px rgba(255,68,0,.18),inset 0 0 35px rgba(255,68,0,.08);}
  to  {box-shadow:0 0 100px rgba(255,68,0,.8),0 0 200px rgba(255,68,0,.28),inset 0 0 70px rgba(255,68,0,.18);}
}
.dz-icon { font-size:48px; filter:drop-shadow(0 0 10px rgba(255,68,0,.7)); }
.dz-btn.on .dz-icon { animation:dz-icon-flash .15s step-end infinite; }
@keyframes dz-icon-flash{0%{filter:drop-shadow(0 0 18px rgba(255,68,0,1)) brightness(1.5);}50%{filter:drop-shadow(0 0 28px rgba(255,170,0,1)) brightness(2);}}
.dz-lbl { font-family:'Orbitron',sans-serif; font-size:18px; letter-spacing:4px; color:var(--hot); text-shadow:0 0 12px rgba(255,68,0,.7); }
.dz-btn.on .dz-lbl { color:var(--hot2); }
.dz-sub { font-size:9px; letter-spacing:2px; color:var(--muted); }
.dz-btn.on .dz-sub { color:var(--hot); }

.dz-status {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:9px 18px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:11px; margin-bottom:24px;
}
.dz-led { width:9px; height:9px; border-radius:50%; background:var(--muted); transition:all .3s; }
.dz-led.on { background:var(--hot); box-shadow:0 0 9px var(--hot); animation:blink .1s step-end infinite; }
.dz-status-txt.on { color:var(--hot); text-shadow:0 0 8px rgba(255,68,0,.5); }
.dz-countdown { background:rgba(255,68,0,.12); border:1px solid var(--hot); border-radius:4px;
                 padding:1px 10px; font-family:'Orbitron',sans-serif; font-size:12px; color:var(--hot); display:none; }
.dz-countdown.show { display:block; }

.dz-controls { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
@media(max-width:540px){.dz-controls{grid-template-columns:1fr;}}

.ctrl-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px;
}
.ctrl-card.span2 { grid-column:span 2; }
@media(max-width:540px){.ctrl-card.span2{grid-column:span 1;}}
.ctrl-lbl {
  font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
  margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;
}
.ctrl-val { font-family:'Orbitron',sans-serif; font-size:17px; color:var(--hot2); text-shadow:0 0 8px rgba(255,170,0,.35); }

.pat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.pat-btn {
  background:#0a0a0a; border:1px solid var(--border); border-radius:8px;
  padding:9px 5px; cursor:pointer; text-align:center; transition:all .2s;
  font-family:'Share Tech Mono',monospace;
}
.pat-btn:hover { border-color:var(--hot); }
.pat-btn.sel { border-color:var(--hot); background:rgba(255,68,0,.08); box-shadow:0 0 10px rgba(255,68,0,.15); }
.pat-icon { font-size:16px; margin-bottom:3px; }
.pat-name { font-size:8px; letter-spacing:1px; color:var(--muted); }
.pat-btn.sel .pat-name { color:var(--hot); }

input[type=range] {
  -webkit-appearance:none; width:100%; height:4px;
  background:linear-gradient(to right,var(--hot) 0%,var(--hot) var(--val,50%),var(--border) var(--val,50%),var(--border) 100%);
  border-radius:2px; cursor:pointer; margin-top:6px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--hot); box-shadow:0 0 8px rgba(255,68,0,.6); cursor:pointer;
}

.chip-row { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  background:#0a0a0a; border:1px solid var(--border); border-radius:6px;
  padding:5px 10px; font-family:'Share Tech Mono',monospace; font-size:10px;
  color:var(--muted); cursor:pointer; transition:all .2s;
}
.chip:hover { border-color:var(--hot); color:var(--text); }
.chip.sel { border-color:var(--hot); color:var(--hot); background:rgba(255,68,0,.08); }
.chip.timer.sel { border-color:var(--hot2); color:var(--hot2); background:rgba(255,170,0,.08); }

.dz-warn {
  border:1px solid #2a1200; border-radius:10px; padding:12px 16px;
  background:rgba(255,68,0,.03); font-size:10px; color:var(--muted); line-height:1.7;
  display:flex; gap:10px; align-items:flex-start;
}

/* ══════════════════════════════════════════════════ */
/*  SETTINGS PAGE                                     */
/* ══════════════════════════════════════════════════ */
#page-settings { flex-direction:column; overflow-y:auto; padding:28px; }
.settings-wrap { max-width:580px; width:100%; }
.settings-section { margin-bottom:28px; }
.settings-section-title {
  font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:3px;
  color:var(--accent); text-transform:uppercase; margin-bottom:16px;
  padding-bottom:8px; border-bottom:1px solid var(--border);
}
.pin-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:500px){.pin-grid{grid-template-columns:1fr;}}
.pin-row { display:flex; flex-direction:column; gap:6px; }
.pin-label { font-size:10px; letter-spacing:1px; color:var(--muted); }
.pin-input-wrap { display:flex; align-items:center; gap:8px; }
.pin-input {
  flex:1; padding:9px 12px; background:var(--card);
  border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px;
  transition:border-color .2s;
}
.pin-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 10px rgba(0,212,255,.12); }
.pin-badge {
  background:rgba(0,212,255,.08); border:1px solid var(--border);
  border-radius:6px; padding:4px 8px; font-size:9px; color:var(--muted);
  white-space:nowrap;
}
.settings-actions { display:flex; gap:10px; margin-top:20px; }
.reboot-warn {
  display:none; margin-top:12px; padding:10px 14px;
  background:rgba(255,170,0,.07); border:1px solid rgba(255,170,0,.3);
  border-radius:8px; font-size:11px; color:var(--hot2);
}
.reboot-warn.show { display:block; }

/* ══════════════════════════════════════════════════ */
/*  TERMINAL PAGE                                     */
/* ══════════════════════════════════════════════════ */
#page-terminal {
  flex-direction:column; height:calc(100vh - 56px); overflow:hidden;
}
.term-output {
  flex:1; overflow-y:auto; padding:16px 20px;
  font-size:12px; line-height:1.7; background:var(--bg);
  font-family:'Share Tech Mono',monospace;
}
.term-line { white-space:pre-wrap; word-break:break-all; }
.term-line.info  { color:var(--text); }
.term-line.ok    { color:var(--green); }
.term-line.warn  { color:var(--hot2); }
.term-line.err   { color:var(--danger); }
.term-line.sys   { color:var(--muted); }
.term-line.dz    { color:var(--hot); }
.term-line.ir    { color:var(--accent); }
.term-toolbar {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; background:var(--surface);
  border-top:1px solid var(--border); flex-shrink:0;
}
.term-status {
  display:flex; align-items:center; gap:7px;
  font-size:10px; color:var(--muted); flex-shrink:0;
}
.term-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
.term-dot.connected { background:var(--green); box-shadow:0 0 7px var(--green); animation:blink 2s infinite; }
.term-actions { display:flex; gap:8px; margin-left:auto; }

/* ══════════════════════════════════════════════════ */
/*  SHARED COMPONENTS                                 */
/* ══════════════════════════════════════════════════ */
.btn {
  padding:9px 18px; border-radius:9px; border:1px solid var(--border);
  background:var(--card); color:var(--text);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px;
}
.btn:hover { border-color:var(--accent); background:rgba(0,212,255,.06); }
.btn-primary { background:linear-gradient(135deg,var(--accent),#0070cc); border-color:transparent; color:#000; font-weight:700; box-shadow:0 0 14px rgba(0,212,255,.25); }
.btn-primary:hover { box-shadow:0 0 22px rgba(0,212,255,.45); transform:translateY(-1px); }
.btn-hot { background:linear-gradient(135deg,var(--hot),#cc3000); border-color:transparent; color:#fff; font-weight:700; box-shadow:0 0 14px rgba(255,68,0,.25); }
.btn-hot:hover { box-shadow:0 0 22px rgba(255,68,0,.45); transform:translateY(-1px); }
.btn-learn { background:linear-gradient(135deg,#ff6b35,var(--hot)); border-color:transparent; color:#fff; font-weight:700; }
.btn-learn:hover { box-shadow:0 0 20px rgba(255,107,53,.5); }
.btn-sm { padding:6px 12px; font-size:10px; }
.btn-danger:hover { border-color:var(--danger); color:var(--danger); }

/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:300;
             display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);
             opacity:0; pointer-events:none; transition:opacity .25s; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:18px;
  padding:26px; width:90%; max-width:380px;
  box-shadow:0 0 50px rgba(0,212,255,.12);
  transform:translateY(16px); transition:transform .25s;
}
.modal-bg.open .modal { transform:translateY(0); }
.modal h3 { font-family:'Orbitron',sans-serif; font-size:14px; letter-spacing:2px; color:var(--accent); margin-bottom:18px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:9px; letter-spacing:2px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; }
.form-group input,.form-group select {
  width:100%; padding:10px 14px; background:var(--card);
  border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-fam
