; ╔══════════════════════════════════════════════════════╗
; ║   ESP32 IR Remote + Dazzler — PlatformIO Config      ║
; ╚══════════════════════════════════════════════════════╝
;
; Targets the generic ESP32 (ESP32-WROOM-32 / ESP32-DevKitC)
; Works with any 4MB flash ESP32 board.
;
; HOW TO USE:
;   1. Install VS Code + PlatformIO extension
;   2. Open this folder in VS Code
;   3. Click the PlatformIO upload button (→)
;   4. Then: PlatformIO → Upload Filesystem Image  (for the web UI)
;
; BOARD NOTES:
;   - Targets esp32dev (ESP32-WROOM-32 generic)
;   - 4MB flash with default partitions (SPIFFS ~1.5MB)
;   - 240 MHz dual-core Xtensa LX6
;   - If your board has 8MB flash, change board_upload.flash_size below

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Upload settings ───────────────────────────────────
monitor_speed    = 115200
upload_speed     = 921600

; ── Partition scheme: default 4MB with SPIFFS ─────────
board_build.partitions = default.csv

; ── Filesystem for web UI ─────────────────────────────
board_build.filesystem = spiffs

; ── Libraries ─────────────────────────────────────────
lib_deps =
  crankyoldgit/IRremoteESP8266 @ ^2.8.6
  bblanchon/ArduinoJson        @ ^6.21.4
  ESP32Async/AsyncTCP          @ ^3.3.6
  ESP32Async/ESPAsyncWebServer @ ^3.3.23

; ── Compiler flags ────────────────────────────────────
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM=0
  -Os
